<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
    </ion-title>
  </ion-toolbar>
</ion-header>


<ion-content  >
  
  <div *ngIf="loader"  class="progress">
    <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100" style="width: 75%;"></div>
  </div>

  <h1 class="text-center">Tomas registradas </h1>
  <div class="container"  *ngIf="!loader" >



    <table class="table table-hover" *ngIf="listaTomas.length > 0" >

      <thead>
        <tr>
          <th scope="col">Id</th>
          <th scope="col">Clave de usuario</th>
          <th scope="col">Alias</th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody>

        @for (item of listaTomas; track $index) {

          <tr class="table-secondary">
            <td> {{ item.id }} </td>
            <td> {{ item.cveusu }} </td>
            <td> {{ item.alias }} </td>
            <td class="cont_btns" > 
              <button type="button" (click)="getMasTomas(item.id!, true)" class="btn btn-success"></button>
              <button id="open-toast" (click)="deleteTomas(item.id!)" type="button" class="btn btn-danger"></button>
            </td>
          </tr>

          <ion-toast
            trigger="open-toast"
            [duration]="3000"
            message="Toma eliminada"
            class="custom-toast"
            [buttons]="toastButtons"
          ></ion-toast>

        }
    
    
      </tbody>
    </table>
    
    <button routerLink="/agregar-toma" class="btn btn-lg btn-primary" type="button">Agregar toma</button>



    <div class="card text-white bg-warning mb-3" *ngIf="listaTomas.length === 0" style="max-width: 20rem;">
      <div class="card-header text-center">Alerta</div>
      <div class="card-body">
        <h4 class="card-title">No tienes tomas registradas</h4>
      </div>
    </div>

    <!-- ion modal -->


  <ion-modal [isOpen]="isModalOpen">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Modal</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="setOpen(false)">Close</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <p>
            {{ titulo }}
        </p>
      </ion-content>
    </ng-template>
  </ion-modal>




    <!-- ! ion modal -->





  </div>

</ion-content>
